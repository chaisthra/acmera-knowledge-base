version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: project-a-pgvector
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop123
      POSTGRES_DB: acmera_kb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: project-a-app
    env_file: .env
    environment:
      PG_HOST: pgvector
      PG_PORT: "5432"
    ports:
      - "8080:8080"
    depends_on:
      - pgvector

volumes:
  pgdata:
